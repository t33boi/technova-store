<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — TechNova</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Page Banner */
        .page-banner {
            background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-700) 50%, var(--blue-500) 100%);
            padding: 48px 0 40px;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }
        .page-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 50%, rgba(0,180,255,0.15) 0%, transparent 60%);
        }
        .page-banner .container { position: relative; z-index: 1; }
        .page-banner h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--gray-300); }
        .breadcrumb a { color: var(--blue-300); }
        .breadcrumb a:hover { color: var(--white); }
        .breadcrumb .sep { color: var(--gray-500); }

        /* Cart Layout */
        .cart-page-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            padding: 40px 0 80px;
        }

        /* Cart Items */
        .cart-items-section {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }
        .cart-table-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr 48px;
            gap: 16px;
            padding: 16px 24px;
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-200);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .cart-item-row {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr 48px;
            gap: 16px;
            padding: 20px 24px;
            align-items: center;
            border-bottom: 1px solid var(--gray-100);
            transition: background var(--transition);
        }
        .cart-item-row:hover { background: var(--gray-50); }
        .cart-item-row:last-child { border-bottom: none; }
        .cart-product-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .cart-product-img {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--gray-100);
            flex-shrink: 0;
        }
        .cart-product-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--navy-800);
            margin-bottom: 4px;
        }
        .cart-product-details h4 a { color: inherit; }
        .cart-product-details h4 a:hover { color: var(--blue-500); }
        .cart-product-details span {
            font-size: 0.82rem;
            color: var(--gray-400);
        }
        .cart-item-price {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--navy-800);
        }
        .cart-qty-controls {
            display: flex;
            align-items: center;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            overflow: hidden;
            width: fit-content;
        }
        .cart-qty-controls button {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-50);
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all var(--transition);
        }
        .cart-qty-controls button:hover { background: var(--blue-500); color: var(--white); }
        .cart-qty-controls span {
            width: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            border-left: 1px solid var(--gray-200);
            border-right: 1px solid var(--gray-200);
            line-height: 34px;
        }
        .cart-item-subtotal {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: var(--blue-500);
        }
        .cart-item-remove {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            color: var(--gray-400);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: all var(--transition);
        }
        .cart-item-remove:hover { background: var(--accent-red); color: var(--white); }

        /* Summary Sidebar */
        .cart-summary {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 20px;
            align-self: start;
        }
        .summary-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        .summary-card h3 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--navy-800);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--gray-100);
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.95rem;
        }
        .summary-row .label { color: var(--gray-500); }
        .summary-row .value { font-weight: 600; color: var(--navy-800); }
        .summary-row.total {
            padding-top: 16px;
            margin-top: 12px;
            border-top: 2px solid var(--gray-200);
        }
        .summary-row.total .label { font-weight: 700; font-size: 1.05rem; color: var(--navy-800); }
        .summary-row.total .value {
            font-family: 'Space Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--blue-500);
        }
        .summary-row.savings .value { color: var(--accent-green); }
        .shipping-note {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: var(--gray-50);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--gray-500);
            margin: 12px 0;
        }
        .shipping-note i { color: var(--accent-green); }
        .summary-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
        .summary-actions .btn { justify-content: center; width: 100%; }

        /* Coupon */
        .coupon-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        .coupon-card h4 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy-800);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coupon-form {
            display: flex;
            gap: 8px;
        }
        .coupon-form input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: border-color var(--transition);
        }
        .coupon-form input:focus { outline: none; border-color: var(--blue-500); }
        .coupon-form button {
            padding: 10px 20px;
            background: var(--navy-800);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background var(--transition);
        }
        .coupon-form button:hover { background: var(--blue-500); }
        .coupon-msg {
            margin-top: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .coupon-msg.success { color: var(--accent-green); }
        .coupon-msg.error { color: var(--accent-red); }

        /* Empty Cart */
        .cart-empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .cart-empty-state i { font-size: 4rem; color: var(--gray-300); margin-bottom: 20px; }
        .cart-empty-state h2 { font-size: 1.5rem; color: var(--navy-800); margin-bottom: 8px; }
        .cart-empty-state p { color: var(--gray-500); margin-bottom: 24px; }

        /* Responsive */
        @media (max-width: 900px) {
            .cart-page-layout { grid-template-columns: 1fr; }
            .cart-summary { position: static; }
        }
        @media (max-width: 700px) {
            .cart-table-header { display: none; }
            .cart-item-row {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 16px;
                position: relative;
            }
            .cart-product-info { gap: 12px; }
            .cart-product-img { width: 64px; height: 64px; }
            .cart-item-row .cart-item-price::before { content: 'Price: '; font-family: 'Outfit', sans-serif; font-weight: 400; color: var(--gray-400); }
            .cart-item-row .cart-item-subtotal::before { content: 'Subtotal: '; font-family: 'Outfit', sans-serif; font-weight: 400; color: var(--gray-400); }
            .cart-item-remove {
                position: absolute;
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <!-- Page Banner -->
    <section class="page-banner animate-on-scroll">
        <div class="container">
            <h1>Shopping Cart</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span class="sep"><i class="fas fa-chevron-right"></i></span>
                <span>Cart</span>
            </div>
        </div>
    </section>

    <div class="container">
        <div id="cart-page-content"></div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="shared.js"></script>
    <script>
    let appliedCoupon = null;
    const COUPONS = { 'TECH10': 0.10, 'NOVA20': 0.20, 'SAVE5K': 5000 };
    const SHIPPING_THRESHOLD = 50000;
    const SHIPPING_FEE = 3500;

    function renderCartPage() {
        const container = document.getElementById('cart-page-content');
        if (cart.length === 0) {
            container.innerHTML = `
                <div class="cart-empty-state animate-on-scroll">
                    <i class="fas fa-shopping-cart"></i>
                    <h2>Your Cart is Empty</h2>
                    <p>Looks like you haven't added any items to your cart yet. Explore our products and find something you love!</p>
                    <a href="shop.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                </div>
            `;
            initScrollAnimations();
            return;
        }

        const subtotal = getCartTotal();
        const shipping = subtotal >= SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
        let discount = 0;
        if (appliedCoupon) {
            const val = COUPONS[appliedCoupon];
            discount = val < 1 ? Math.round(subtotal * val) : val;
        }
        const total = subtotal + shipping - discount;

        container.innerHTML = `
            <div class="cart-page-layout">
                <div class="cart-items-section animate-on-scroll">
                    <div class="cart-table-header">
                        <span>Product</span>
                        <span>Price</span>
                        <span>Quantity</span>
                        <span>Subtotal</span>
                        <span></span>
                    </div>
                    ${cart.map(item => `
                        <div class="cart-item-row">
                            <div class="cart-product-info">
                                <img class="cart-product-img" src="${item.image}" alt="${item.name}">
                                <div class="cart-product-details">
                                    <h4><a href="product.html?id=${item.id}">${item.name}</a></h4>
                                    <span>SKU: TN-${String(item.id).padStart(5, '0')}</span>
                                </div>
                            </div>
                            <div class="cart-item-price">${formatPrice(item.price)}</div>
                            <div>
                                <div class="cart-qty-controls">
                                    <button onclick="updateCartQty(${item.id}, -1)">-</button>
                                    <span>${item.qty}</span>
                                    <button onclick="updateCartQty(${item.id}, 1)">+</button>
                                </div>
                            </div>
                            <div class="cart-item-subtotal">${formatPrice(item.price * item.qty)}</div>
                            <button class="cart-item-remove" onclick="removeFromCart(${item.id})" title="Remove"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `).join('')}
                </div>
                <aside class="cart-summary">
                    <div class="summary-card animate-on-scroll">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span class="label">Subtotal (${getCartCount()} items)</span>
                            <span class="value">${formatPrice(subtotal)}</span>
                        </div>
                        <div class="summary-row">
                            <span class="label">Shipping</span>
                            <span class="value">${shipping === 0 ? '<span style="color:var(--accent-green)">FREE</span>' : formatPrice(shipping)}</span>
                        </div>
                        ${discount > 0 ? `
                        <div class="summary-row savings">
                            <span class="label">Discount (${appliedCoupon})</span>
                            <span class="value">-${formatPrice(discount)}</span>
                        </div>` : ''}
                        ${shipping > 0 ? `
                        <div class="shipping-note">
                            <i class="fas fa-info-circle"></i>
                            Free shipping on orders over ${formatPrice(SHIPPING_THRESHOLD)}
                        </div>` : `
                        <div class="shipping-note">
                            <i class="fas fa-check-circle"></i>
                            You qualify for free shipping!
                        </div>`}
                        <div class="summary-row total">
                            <span class="label">Total</span>
                            <span class="value">${formatPrice(total)}</span>
                        </div>
                        <div class="summary-actions">
                            <button class="btn btn-primary btn-lg" onclick="showToast('Checkout coming soon!','success')"><i class="fas fa-lock"></i> Proceed to Checkout</button>
                            <a href="shop.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                        </div>
                    </div>
                    <div class="coupon-card animate-on-scroll">
                        <h4><i class="fas fa-ticket-alt"></i> Have a Coupon?</h4>
                        <div class="coupon-form">
                            <input type="text" id="coupon-input" placeholder="Enter coupon code" ${appliedCoupon ? 'disabled' : ''} value="${appliedCoupon || ''}">
                            <button id="coupon-btn">${appliedCoupon ? 'Remove' : 'Apply'}</button>
                        </div>
                        <div class="coupon-msg" id="coupon-msg">${appliedCoupon ? '<span class="success"><i class="fas fa-check-circle"></i> Coupon applied successfully!</span>' : ''}</div>
                    </div>
                </aside>
            </div>
        `;

        // Coupon events
        document.getElementById('coupon-btn').addEventListener('click', function() {
            if (appliedCoupon) {
                appliedCoupon = null;
                renderCartPage();
                showToast('Coupon removed', 'success');
                return;
            }
            const code = document.getElementById('coupon-input').value.trim().toUpperCase();
            if (!code) {
                document.getElementById('coupon-msg').innerHTML = '<span class="error"><i class="fas fa-times-circle"></i> Please enter a coupon code</span>';
                return;
            }
            if (COUPONS[code] !== undefined) {
                appliedCoupon = code;
                renderCartPage();
                showToast('Coupon applied!', 'success');
            } else {
                document.getElementById('coupon-msg').innerHTML = '<span class="error"><i class="fas fa-times-circle"></i> Invalid coupon code. Try TECH10 or NOVA20</span>';
            }
        });

        document.getElementById('coupon-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('coupon-btn').click();
        });

        initScrollAnimations();
    }

    // Run after shared.js init
    setTimeout(renderCartPage, 50);
    </script>
</body>
</html>
